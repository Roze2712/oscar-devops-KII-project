# Copy this file to k8s/secret.yaml, fill in real values, and DO NOT
# commit secret.yaml to git. The preferred production workflow is:
#
#   kubectl create secret generic oscar-app-secrets \
#     --namespace oscar \
#     --from-literal=NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=... \
#     --from-literal=RESEND_API_KEY=... \
#     --from-literal=POSTGRES_PASSWORD=...
#
# This example file uses stringData (plain text) so it's easy to edit.
# Kubernetes will base64-encode the values on apply.
apiVersion: v1
kind: Secret
metadata:
  name: oscar-app-secrets
  namespace: oscar
  labels:
    app: oscar-app
type: Opaque
stringData:
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: "replace-me-publishable-or-anon-key"
  RESEND_API_KEY: "re_replace_me"
  POSTGRES_PASSWORD: "replace-me-strong-password"
